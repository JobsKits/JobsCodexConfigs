model_provider = "tokenlb"

# ═══ 切换模型：取消下面某一行的注释即可 ═══
# ——— OpenAI 旗舰 ———
model = "gpt-5.5"

model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "none"
model_context_window = 1050000
model_auto_compact_token_limit = 945000
tool_output_token_limit = 6000
approval_policy = "never"
sandbox_mode = "danger-full-access"
suppress_unstable_features_warning = true

[model_providers.tokenlb]
name = "OpenAI"
base_url = "https://tokenlb.net/v1"
wire_api = "responses"
requires_openai_auth = false
env_key = "TOKENLB_API_KEY"
supports_websockets = true

[features]
responses_websockets_v2 = true
multi_agent = true
remote_connections = true
hooks = false

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[marketplaces.openai-bundled]
last_updated = "2026-05-18T09:21:34Z"
source_type = "local"
source = "/Users/jobs/.codex/.tmp/bundled-marketplaces/openai-bundled"

[projects."/Users/jobs/Documents/JobsOCBaseConfigDemo"]
trust_level = "trusted"

[plugins."browser@openai-bundled"]
enabled = true
